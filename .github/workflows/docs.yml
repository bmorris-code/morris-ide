name: Deploy Documentation

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build documentation
      run: |
        npm run build
        mkdir -p docs-dist
        if [ -d "dist" ]; then
          cp -r dist/* docs-dist/
        fi
        cp README.md docs-dist/
        if [ -d "docs" ]; then
          cp -r docs docs-dist/
        fi
        cat > docs-dist/index.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morris IDE - AI-Powered Development Environment</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
            color: #333;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .features {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .cta-button {
            display: inline-block;
            background: #007bff;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            margin: 10px 0;
        }
        .cta-button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Morris IDE</h1>
        <h2>Advanced AI-Powered IDE with Multi-Agent Orchestration</h2>
        <p><strong>Experience the future of coding with specialized AI agents!</strong></p>
    </div>
    
    <div class="features">
        <h2>🎯 Key Features</h2>
        <ul>
            <li>6 Specialized AI Agents</li>
            <li>Multi-Agent Workflows</li>
            <li>2M Token Context (Kimi K2.6)</li>
            <li>Real-time Streaming</li>
            <li>Enterprise Security</li>
        </ul>
    </div>
    
    <h2>📥 Quick Start</h2>
    <p>
        <a href="https://github.com/bmorris-code/morris-ide/releases" class="cta-button">
            Download Now
        </a>
    </p>
    
    <h2>📚 Documentation</h2>
    <ul>
        <li><a href="README.md">README</a></li>
        <li><a href="docs/">Full Documentation</a></li>
    </ul>
</body>
</html>
EOF

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
