name: Deploy Documentation

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  deployments: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build documentation
      run: |
        npm run build
        mkdir -p docs-dist
        if [ -d "dist" ]; then
          cp -r dist/* docs-dist/
        fi
        cp README.md docs-dist/
        if [ -d "docs" ]; then
          cp -r docs docs-dist/
        fi
        echo '<!DOCTYPE html>' > docs-dist/index.html
        echo '<html lang="en">' >> docs-dist/index.html
        echo '<head>' >> docs-dist/index.html
        echo '    <meta charset="UTF-8">' >> docs-dist/index.html
        echo '    <meta name="viewport" content="width=device-width, initial-scale=1.0">' >> docs-dist/index.html
        echo '    <title>Morris IDE - AI-Powered Development Environment</title>' >> docs-dist/index.html
        echo '    <style>' >> docs-dist/index.html
        echo '        body {' >> docs-dist/index.html
        echo '            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;' >> docs-dist/index.html
        echo '            max-width: 800px;' >> docs-dist/index.html
        echo '            margin: 0 auto;' >> docs-dist/index.html
        echo '            padding: 20px;' >> docs-dist/index.html
        echo '            line-height: 1.6;' >> docs-dist/index.html
        echo '            color: #333;' >> docs-dist/index.html
        echo '        }' >> docs-dist/index.html
        echo '        .header {' >> docs-dist/index.html
        echo '            text-align: center;' >> docs-dist/index.html
        echo '            margin-bottom: 40px;' >> docs-dist/index.html
        echo '        }' >> docs-dist/index.html
        echo '        .features {' >> docs-dist/index.html
        echo '            background: #f5f5f5;' >> docs-dist/index.html
        echo '            padding: 20px;' >> docs-dist/index.html
        echo '            border-radius: 8px;' >> docs-dist/index.html
        echo '            margin: 20px 0;' >> docs-dist/index.html
        echo '        }' >> docs-dist/index.html
        echo '        .cta-button {' >> docs-dist/index.html
        echo '            display: inline-block;' >> docs-dist/index.html
        echo '            background: #007bff;' >> docs-dist/index.html
        echo '            color: white;' >> docs-dist/index.html
        echo '            padding: 12px 24px;' >> docs-dist/index.html
        echo '            text-decoration: none;' >> docs-dist/index.html
        echo '            border-radius: 6px;' >> docs-dist/index.html
        echo '            margin: 10px 0;' >> docs-dist/index.html
        echo '        }' >> docs-dist/index.html
        echo '        .cta-button:hover {' >> docs-dist/index.html
        echo '            background: #0056b3;' >> docs-dist/index.html
        echo '        }' >> docs-dist/index.html
        echo '    </style>' >> docs-dist/index.html
        echo '</head>' >> docs-dist/index.html
        echo '<body>' >> docs-dist/index.html
        echo '    <div class="header">' >> docs-dist/index.html
        echo '        <h1>🚀 Morris IDE</h1>' >> docs-dist/index.html
        echo '        <h2>Advanced AI-Powered IDE with Multi-Agent Orchestration</h2>' >> docs-dist/index.html
        echo '        <p><strong>Experience the future of coding with specialized AI agents!</strong></p>' >> docs-dist/index.html
        echo '    </div>' >> docs-dist/index.html
        echo '    <div class="features">' >> docs-dist/index.html
        echo '        <h2>🎯 Key Features</h2>' >> docs-dist/index.html
        echo '        <ul>' >> docs-dist/index.html
        echo '            <li>6 Specialized AI Agents</li>' >> docs-dist/index.html
        echo '            <li>Multi-Agent Workflows</li>' >> docs-dist/index.html
        echo '            <li>2M Token Context (Kimi K2.6)</li>' >> docs-dist/index.html
        echo '            <li>Real-time Streaming</li>' >> docs-dist/index.html
        echo '            <li>Enterprise Security</li>' >> docs-dist/index.html
        echo '        </ul>' >> docs-dist/index.html
        echo '    </div>' >> docs-dist/index.html
        echo '    <h2>📥 Quick Start</h2>' >> docs-dist/index.html
        echo '    <p>' >> docs-dist/index.html
        echo '        <a href="https://github.com/bmorris-code/morris-ide/releases" class="cta-button">' >> docs-dist/index.html
        echo '            Download Now' >> docs-dist/index.html
        echo '        </a>' >> docs-dist/index.html
        echo '    </p>' >> docs-dist/index.html
        echo '    <h2>📚 Documentation</h2>' >> docs-dist/index.html
        echo '    <ul>' >> docs-dist/index.html
        echo '        <li><a href="README.md">README</a></li>' >> docs-dist/index.html
        echo '        <li><a href="docs/">Full Documentation</a></li>' >> docs-dist/index.html
        echo '    </ul>' >> docs-dist/index.html
        echo '</body>' >> docs-dist/index.html
        echo '</html>' >> docs-dist/index.html

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs-dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
